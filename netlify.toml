[build]
  publish = "public"
  functions = "api"

[[edge_functions]]
  function = "geo-block"
  path = "/*"

[[redirects]]
  from = "/data/*"
  to = "/../data/:splat"
  status = 200

[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  
