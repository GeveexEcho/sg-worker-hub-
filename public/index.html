<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Worker Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        
        .header { 
            background: rgba(17, 17, 17, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        #header-title {
            margin: 0;
            font-size: 22px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        #lang-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        #lang-toggle:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .banner { 
            background: #222 url('https://raw.githubusercontent.com/GeveexEcho/sg-worker-hub-/main/public/construction_banner.png') center/cover no-repeat; 
            height: 320px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            padding-top: 50px;
        }

        .banner-overlay { background: rgba(0,0,0,0.4); position: absolute; top:0; left:0; right:0; bottom:0; }
        
        .search-container { position: relative; z-index: 10; width: 85%; max-width: 600px; }
        
        .search-bar { 
            width: 100%; 
            padding: 16px; 
            border: 4px solid #ff9800; 
            border-radius: 12px; 
            font-size: 18px; 
            outline: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        
        .submit-box { 
            background: #4caf50; 
            color: white; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
            margin: 25px auto; 
            width: 85%; 
            max-width: 600px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 18px; 
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); 
            transition: 0.3s; 
        }

        .submit-box:hover { transform: translateY(-2px); background: #45a049; }

        .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; }
        
        .modal { display: none; background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }

        button { background: #111; color: white; padding: 12px 20px; border: none; margin-top: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        
        button.green { background: #4caf50; width: 100%; font-size: 18px; }
        
        .result-card { border-left: 6px solid #ff9800; background: #fff; padding: 15px; margin-top: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .review-list { margin-top: 10px; padding-left: 20px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="header-title">SG Worker Hub</h2>
        <button id="lang-toggle" onclick="toggleLanguage()">বাংলা / English</button>
    </div>

    <div class="banner">
        <div class="banner-overlay"></div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-bar" placeholder="Search company by name..." onkeyup="handleSearch()">
        </div>
    </div>

    <div class="submit-box" id="submit-trigger" onclick="toggleSubmitForm()">
        ➕ Submit Company Name & Activities
    </div>

    <div class="container">
        <div id="submit-form" class="modal">
            <h3 id="form-title">Report a New Company</h3>
            <input type="text" id="company-name" placeholder="Exact Company Name">
            <textarea id="company-activity" rows="4" placeholder="Describe the fraudulent activity..."></textarea>
            <button class="green" onclick="submitCompany()" id="submit-btn">Submit Report</button>
            <p id="submit-status" style="margin-top:10px; font-weight:bold;"></p>
        </div>
        <div id="results-container"></div>
    </div>

    <script src="/src/app.js"></script>
    <script src="/src/search.js"></script>
    <script src="/src/submit.js"></script>

</body>
</html>
