<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Worker Hub</title>
    
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">

    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: url('https://raw.githubusercontent.com/GeveexEcho/sg-worker-hub-/main/public/construction_banner.png') no-repeat center center fixed; 
            background-size: cover;
        }

        .page-overlay {
            background: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }
        
        .header { 
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        #header-title {
            margin: 0;
            font-size: 20px;
            color: #ff9800;
        }

        #lang-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .banner { 
            height: 250px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding-top: 60px;
        }
        
        .search-container { width: 90%; max-width: 600px; }
        
        .search-bar { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid #ff9800; 
            border-radius: 15px; 
            font-size: 18px; 
            outline: none; 
            background: rgba(255, 255, 255, 0.9);
        }
        
        .submit-box { 
            background: rgba(76, 175, 80, 0.8); 
            color: white; 
            padding: 18px; 
            text-align: center; 
            cursor: pointer; 
            margin: 10px auto; 
            width: 90%; 
            max-width: 600px; 
            border-radius: 15px; 
            font-weight: bold; 
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        
        .result-card { 
            background: transparent; 
            border-left: 5px solid #ff9800; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .result-card h3 { color: #ff9800; margin-top: 0; }
        .result-card p { margin-bottom: 5px; line-height: 1.5; }

        .modal { 
            display: none; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            color: #333;
        }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
        }

        button.green { 
            background: #2e7d32; 
            color: white;
            width: 100%; 
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="page-overlay">
        <div class="header">
            <h2 id="header-title">SG Worker Hub</h2>
            <button id="lang-toggle" onclick="toggleLanguage()">বাংলা / English</button>
        </div>

        <div class="banner">
            <div class="search-container">
                <input type="text" id="search-input" class="search-bar" placeholder="Search company by name..." onkeyup="handleSearch()">
            </div>
        </div>

        <div class="submit-box" id="submit-trigger" onclick="toggleSubmitForm()">
            ➕ Submit Company Name & Activities
        </div>

        <div class="container">
            <div id="submit-form" class="modal">
                <h3 id="form-title">Report a New Company</h3>
                <input type="text" id="company-name" placeholder="Exact Company Name">
                <textarea id="company-activity" rows="4" placeholder="Describe the activities..."></textarea>
                <button class="green" onclick="submitCompany()" id="submit-btn">Submit Report</button>
                <p id="submit-status" style="margin-top:10px; font-weight:bold;"></p>
            </div>
            
            <div id="results-container"></div>
        </div>
    </div>

    <script src="/src/app.js"></script>
    <script src="/src/search.js"></script>
    <script src="/src/submit.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>

</body>
</html>
